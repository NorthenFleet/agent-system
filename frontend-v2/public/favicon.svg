<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg-grad)"/>
  
  <!-- Network nodes -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round">
    <!-- Center hub -->
    <circle cx="32" cy="32" r="6" fill="white" fill-opacity="0.9"/>
    
    <!-- Node 1 - top-left -->
    <line x1="28" y1="28" x2="18" y2="16"/>
    <circle cx="18" cy="16" r="4" fill="white" fill-opacity="0.8"/>
    
    <!-- Node 2 - top-right -->
    <line x1="36" y1="28" x2="46" y2="16"/>
    <circle cx="46" cy="16" r="4" fill="white" fill-opacity="0.8"/>
    
    <!-- Node 3 - bottom -->
    <line x1="32" y1="38" x2="32" y2="50"/>
    <circle cx="32" cy="50" r="4" fill="white" fill-opacity="0.8"/>
    
    <!-- Node 4 - left -->
    <line x1="26" y1="32" x2="14" y2="36"/>
    <circle cx="14" cy="36" r="4" fill="white" fill-opacity="0.8"/>
    
    <!-- Node 5 - right -->
    <line x1="38" y1="32" x2="50" y2="36"/>
    <circle cx="50" cy="36" r="4" fill="white" fill-opacity="0.8"/>
    
    <!-- Node connections -->
    <line x1="18" y1="16" x2="46" y2="16" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="14" y1="36" x2="50" y2="36" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="18" y1="16" x2="14" y2="36" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="46" y1="16" x2="50" y2="36" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>
  
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg>