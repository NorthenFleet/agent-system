<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能体集群系统 - 一叶科技</title>
    
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Element Plus -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <!-- Element Plus Icons -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .login-header h1 {
            font-size: 24px;
            color: #333;
            font-weight: 600;
        }

        .login-header p {
            color: #999;
            margin-top: 8px;
            font-size: 14px;
        }

        .form-item {
            margin-bottom: 20px;
        }

        .login-btn {
            width: 100%;
            height: 44px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .login-success {
            text-align: center;
            padding: 40px 20px;
        }

        .login-success .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #67c23a 0%, #55a132 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            animation: successPop 0.5s ease;
        }

        @keyframes successPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .login-success h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .login-success p {
            color: #999;
            margin-bottom: 20px;
        }

        .countdown {
            font-size: 14px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-card" v-if="!loggedIn">
                <div class="login-header">
                    <div class="logo">🌙</div>
                    <h1>智能体集群系统</h1>
                    <p>一叶科技</p>
                </div>

                <el-form :model="form" :rules="rules" ref="loginForm" label-width="0">
                    <el-form-item prop="username">
                        <el-input
                            v-model="form.username"
                            placeholder="用户名"
                            prefix-icon="User"
                            size="large"
                            clearable
                        ></el-input>
                    </el-form-item>

                    <el-form-item prop="password">
                        <el-input
                            v-model="form.password"
                            type="password"
                            placeholder="密码"
                            prefix-icon="Lock"
                            size="large"
                            show-password
                            @keyup.enter="handleLogin"
                        ></el-input>
                    </el-form-item>

                    <div class="remember-me">
                        <el-checkbox v-model="form.remember">记住我</el-checkbox>
                    </div>

                    <div class="forgot-password">
                        <a href="#">忘记密码？</a>
                    </div>

                    <el-form-item>
                        <el-button
                            type="primary"
                            class="login-btn"
                            :loading="loading"
                            @click="handleLogin"
                        >
                            {{ loading ? '登录中...' : '登录' }}
                        </el-button>
                    </el-form-item>
                </el-form>
            </div>

            <!-- 登录成功 -->
            <div class="login-card" v-else>
                <div class="login-success">
                    <div class="success-icon">✓</div>
                    <h2>登录成功！</h2>
                    <p>欢迎回来，{{ form.username }}</p>
                    <p class="countdown">{{ countdown }} 秒后跳转到首页...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted } = Vue;

        const app = createApp({
            setup() {
                const loginForm = ref(null);
                const loading = ref(false);
                const loggedIn = ref(false);
                const countdown = ref(3);

                const form = reactive({
                    username: '',
                    password: '',
                    remember: false
                });

                const rules = {
                    username: [
                        { required: true, message: '请输入用户名', trigger: 'blur' },
                        { min: 2, max: 20, message: '用户名长度 2-20 个字符', trigger: 'blur' }
                    ],
                    password: [
                        { required: true, message: '请输入密码', trigger: 'blur' },
                        { min: 6, max: 30, message: '密码长度 6-30 个字符', trigger: 'blur' }
                    ]
                };

                // 记住登录状态
                onMounted(() => {
                    const savedUsername = localStorage.getItem('rememberedUsername');
                    if (savedUsername) {
                        form.username = savedUsername;
                        form.remember = true;
                    }
                });

                const handleLogin = async () => {
                    if (!loginForm.value) return;

                    await loginForm.value.validate(async (valid) => {
                        if (valid) {
                            loading.value = true;

                            // 模拟登录请求
                            await new Promise(resolve => setTimeout(resolve, 1500));

                            loading.value = false;
                            loggedIn.value = true;

                            // 记住用户名
                            if (form.remember) {
                                localStorage.setItem('rememberedUsername', form.username);
                            } else {
                                localStorage.removeItem('rememberedUsername');
                            }

                            // 倒计时跳转
                            const timer = setInterval(() => {
                                countdown.value--;
                                if (countdown.value <= 0) {
                                    clearInterval(timer);
                                    window.location.href = 'index.html';
                                }
                            }, 1000);
                        }
                    });
                };

                return {
                    loginForm,
                    loading,
                    loggedIn,
                    countdown,
                    form,
                    rules,
                    handleLogin
                };
            }
        });

        // 注册图标
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
