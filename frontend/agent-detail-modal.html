<!-- 智能体详情弹窗 -->
<el-dialog 
  v-model="agentDetailVisible" 
  title="智能体详情" 
  width="900px"
  :before-close="closeAgentDetail">
  
  <div v-if="selectedAgentDetail" style="display: flex; gap: 20px;">
    <!-- 左侧：基本信息 -->
    <div style="flex: 1; min-width: 300px;">
      <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding: 16px; background: rgba(88, 166, 255, 0.1); border-radius: 12px;">
        <div class="agent-avatar" :class="selectedAgentDetail.team === 'autobots' ? 'autobot' : 'turtle'" 
             style="width: 64px; height: 64px; font-size: 32px;">
          {{ selectedAgentDetail.emoji }}
        </div>
        <div>
          <h3 style="margin: 0; font-size: 1.3rem;">{{ selectedAgentDetail.name }}</h3>
          <div style="color: var(--text-secondary);">{{ selectedAgentDetail.role }}</div>
          <el-tag size="small" :type="selectedAgentDetail.status === 'online' ? 'success' : (selectedAgentDetail.status === 'busy' ? 'warning' : 'info')" style="margin-top: 8px;">
            {{ selectedAgentDetail.status }}
          </el-tag>
        </div>
      </div>
      
      <!-- 📝 记忆区 -->
      <div style="margin-bottom: 20px;">
        <h4 style="margin: 0 0 12px 0; color: var(--primary);"><i class="fas fa-brain"></i> 📝 记忆文档</h4>
        <div v-if="selectedAgentDetail.memory && selectedAgentDetail.memory.length > 0" 
             style="display: flex; flex-direction: column; gap: 8px;">
          <div v-for="(mem, idx) in selectedAgentDetail.memory" :key="idx" 
               style="padding: 12px; background: var(--card); border-radius: 8px; border-left: 3px solid var(--primary);">
            <i class="fas fa-file-alt" style="color: var(--primary); margin-right: 8px;"></i>
            {{ mem }}
          </div>
        </div>
        <el-empty v-else description="暂无记忆" :image-size="60" />
      </div>
    </div>
    
    <!-- 右侧：管理文档 -->
    <div style="flex: 1; min-width: 300px;">
      <h4 style="margin: 0 0 12px 0; color: var(--success);"><i class="fas fa-folder"></i> 📁 管理文档</h4>
      <div v-if="selectedAgentDetail.managedDocs && selectedAgentDetail.managedDocs.length > 0" 
           style="display: flex; flex-direction: column; gap: 8px;">
        <div v-for="(doc, idx) in selectedAgentDetail.managedDocs" :key="idx" 
             style="padding: 12px; background: var(--card); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;"
             @click="viewDocument(doc)">
          <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-file-alt" style="color: var(--success); font-size: 1.2rem;"></i>
            <div>
              <div style="font-weight: 500;">{{ doc.name }}</div>
              <div style="font-size: 0.8rem; color: var(--text-secondary);">{{ doc.path }}</div>
            </div>
          </div>
          <el-tag size="small" type="info">{{ doc.type }}</el-tag>
        </div>
      </div>
      <el-empty v-else description="暂无管理文档" :image-size="60" />
    </div>
  </div>
</el-dialog>
