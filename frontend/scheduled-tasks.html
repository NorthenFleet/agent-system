<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定时任务管理 - 团队看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { 
            color: #58a6ff; 
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .wave-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(88, 166, 255, 0.15);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: #58a6ff;
            margin-left: auto;
        }
        
        .section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-group label {
            font-size: 13px;
            color: #8b949e;
        }
        
        .filter-select {
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 13px;
            cursor: pointer;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: #58a6ff;
        }
        
        .task-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .task-table th {
            text-align: left;
            padding: 12px;
            background: #0d1117;
            border-bottom: 2px solid #30363d;
            color: #8b949e;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .task-table td {
            padding: 12px;
            border-bottom: 1px solid #30363d;
            font-size: 13px;
        }
        
        .task-table tr:hover {
            background: rgba(88, 166, 255, 0.05);
        }
        
        .task-name {
            font-weight: 600;
            color: #c9d1d9;
        }
        
        .task-id {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 11px;
            color: #58a6ff;
            margin-top: 2px;
        }
        
        .task-description {
            color: #8b949e;
            font-size: 12px;
            margin-top: 4px;
        }
        
        .agent-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: #21262d;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-normal {
            background: rgba(63, 185, 80, 0.15);
            color: #3fb950;
            border: 1px solid rgba(63, 185, 80, 0.3);
        }
        
        .status-delayed {
            background: rgba(210, 153, 34, 0.15);
            color: #d29922;
            border: 1px solid rgba(210, 153, 34, 0.3);
        }
        
        .status-failed {
            background: rgba(248, 81, 73, 0.15);
            color: #f85149;
            border: 1px solid rgba(248, 81, 73, 0.3);
        }
        
        .success-rate {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .rate-bar {
            width: 60px;
            height: 6px;
            background: #30363d;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .rate-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .rate-high { background: #3fb950; }
        .rate-medium { background: #d29922; }
        .rate-low { background: #f85149; }
        
        .frequency {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            color: #58a6ff;
        }
        
        .time-slot {
            color: #8b949e;
            font-size: 12px;
        }
        
        .next-run {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            color: #c9d1d9;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        .refresh-btn {
            padding: 8px 16px;
            background: #1f6feb;
            border: 1px solid #1f6feb;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #388bfd;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px 20px;
            min-width: 150px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #c9d1d9;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8b949e;
            margin-top: 4px;
        }
        
        .stat-card.normal .stat-value { color: #3fb950; }
        .stat-card.delayed .stat-value { color: #d29922; }
        .stat-card.failed .stat-value { color: #f85149; }
        
        .manager-info {
            margin-top: 10px;
            padding: 10px 15px;
            background: rgba(136, 46, 224, 0.1);
            border: 1px solid rgba(136, 46, 224, 0.3);
            border-radius: 6px;
            font-size: 13px;
            color: #a855f7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-actions">
            <h1>
                ⏰ 定时任务管理
                <span class="wave-badge">🌊 由震荡波统一管理</span>
            </h1>
            <button class="refresh-btn" onclick="loadTasks()">🔄 刷新</button>
        </div>
        
        <div class="manager-info" id="manager-info">
            🟣 管理者：震荡波 - 团队优化师 (定时任务总调度)
        </div>
        
        <div class="stats">
            <div class="stat-card normal">
                <div class="stat-value" id="stat-normal">-</div>
                <div class="stat-label">🟢 正常运行</div>
            </div>
            <div class="stat-card delayed">
                <div class="stat-value" id="stat-delayed">-</div>
                <div class="stat-label">🟡 延迟</div>
            </div>
            <div class="stat-card failed">
                <div class="stat-value" id="stat-failed">-</div>
                <div class="stat-label">🔴 失败</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-total">-</div>
                <div class="stat-label">📊 总任务数</div>
            </div>
        </div>
        
        <div class="section">
            <div class="filters">
                <div class="filter-group">
                    <label>负责人:</label>
                    <select class="filter-select" id="filter-agent" onchange="applyFilters()">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>状态:</label>
                    <select class="filter-select" id="filter-status" onchange="applyFilters()">
                        <option value="">全部</option>
                        <option value="normal">🟢 正常</option>
                        <option value="delayed">🟡 延迟</option>
                        <option value="failed">🔴 失败</option>
                    </select>
                </div>
            </div>
            
            <table class="task-table">
                <thead>
                    <tr>
                        <th style="width: 20%">任务名称</th>
                        <th style="width: 12%">负责人</th>
                        <th style="width: 10%">执行频率</th>
                        <th style="width: 10%">时间槽</th>
                        <th style="width: 12%">下次执行</th>
                        <th style="width: 12%">成功率</th>
                        <th style="width: 10%">状态</th>
                        <th>描述</th>
                    </tr>
                </thead>
                <tbody id="task-list">
                    <tr>
                        <td colspan="8" class="loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let allTasks = [];
        let agents = new Set();
        let managerInfo = {};
        
        async function loadTasks() {
            try {
                const res = await fetch(`${API_BASE}/api/scheduled-tasks`);
                const data = await res.json();
                
                allTasks = (data.tasks || []).map(task => ({
                    ...task,
                    // 映射字段名以匹配前端
                    agent: task.owner || task.agent,
                    agent_emoji: task.owner_emoji || task.agent_emoji || '🤖',
                    frequency: task.schedule || task.frequency,
                    // 将 status 从 active/inactive 映射为 normal/delayed/failed
                    status: mapStatus(task.status)
                }));
                
                managerInfo = {
                    name: data.managed_by || '震荡波',
                    role: data.manager_role || '团队优化师'
                };
                
                // 收集所有负责人
                agents.clear();
                allTasks.forEach(task => {
                    if (task.agent) agents.add(task.agent);
                });
                
                updateAgentFilter();
                updateManagerInfo();
                applyFilters();
                updateStats();
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('task-list').innerHTML = `
                    <tr>
                        <td colspan="8" class="empty">加载失败：${error.message}</td>
                    </tr>
                `;
            }
        }
        
        function mapStatus(status) {
            // 将后端状态映射为前端状态
            if (status === 'active') return 'normal';
            if (status === 'inactive') return 'delayed';
            if (status === 'failed') return 'failed';
            return status || 'normal';
        }
        
        function updateManagerInfo() {
            const infoEl = document.getElementById('manager-info');
            if (managerInfo.name && managerInfo.role) {
                infoEl.textContent = `🟣 管理者：${managerInfo.name} - ${manager.role}`;
            }
        }
        
        function updateAgentFilter() {
            const select = document.getElementById('filter-agent');
            const currentValue = select.value;
            
            select.innerHTML = '<option value="">全部</option>';
            agents.forEach(agent => {
                select.innerHTML += `<option value="${agent}">${agent}</option>`;
            });
            
            select.value = currentValue;
        }
        
        function applyFilters() {
            const agentFilter = document.getElementById('filter-agent').value;
            const statusFilter = document.getElementById('filter-status').value;
            
            let filtered = allTasks;
            
            if (agentFilter) {
                filtered = filtered.filter(t => t.agent === agentFilter);
            }
            
            if (statusFilter) {
                filtered = filtered.filter(t => t.status === statusFilter);
            }
            
            renderTasks(filtered);
        }
        
        function renderTasks(tasks) {
            const tbody = document.getElementById('task-list');
            
            if (tasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty">暂无定时任务</td></tr>';
                return;
            }
            
            tbody.innerHTML = tasks.map(task => `
                <tr>
                    <td>
                        <div class="task-name">${escapeHtml(task.name || '未命名任务')}</div>
                        <div class="task-id">${escapeHtml(task.id || '')}</div>
                    </td>
                    <td>
                        <span class="agent-badge">${task.agent_emoji || '🤖'} ${escapeHtml(task.agent || '未知')}</span>
                    </td>
                    <td>
                        <span class="frequency">${escapeHtml(task.frequency || '-')}</span>
                    </td>
                    <td>
                        <span class="time-slot">${escapeHtml(task.time_slot || '-')}</span>
                    </td>
                    <td>
                        <span class="next-run">${formatNextRun(task.next_run)}</span>
                    </td>
                    <td>
                        ${renderSuccessRate(task.success_rate)}
                    </td>
                    <td>
                        ${renderStatus(task.status)}
                    </td>
                    <td>
                        <div class="task-description">${escapeHtml(task.description || '-')}</div>
                    </td>
                </tr>
            `).join('');
        }
        
        function renderStatus(status) {
            const statusMap = {
                'normal': { class: 'status-normal', icon: '🟢', text: '正常' },
                'delayed': { class: 'status-delayed', icon: '🟡', text: '延迟' },
                'failed': { class: 'status-failed', icon: '🔴', text: '失败' }
            };
            
            const s = statusMap[status] || { class: 'status-normal', icon: '⚪', text: status };
            return `<span class="status-badge ${s.class}">${s.icon} ${s.text}</span>`;
        }
        
        function renderSuccessRate(rate) {
            if (rate === undefined || rate === null) return '<span class="success-rate">-</span>';
            
            // 处理百分比格式 (0-100 或 0-1)
            let normalizedRate = rate;
            if (rate > 1) normalizedRate = rate / 100;
            
            const percentage = Math.round(normalizedRate * 100);
            let rateClass = 'rate-high';
            if (normalizedRate < 0.5) rateClass = 'rate-low';
            else if (normalizedRate < 0.8) rateClass = 'rate-medium';
            
            return `
                <div class="success-rate">
                    <div class="rate-bar">
                        <div class="rate-fill ${rateClass}" style="width: ${percentage}%"></div>
                    </div>
                    <span>${percentage}%</span>
                </div>
            `;
        }
        
        function formatNextRun(timestamp) {
            if (!timestamp) return '-';
            
            const date = new Date(timestamp);
            const now = new Date();
            const diff = date - now;
            
            if (diff < 0) return '已过期';
            if (diff < 60000) return '即将执行';
            if (diff < 3600000) return `${Math.round(diff / 60000)}分钟后`;
            if (diff < 86400000) return `${Math.round(diff / 3600000)}小时后`;
            
            return date.toLocaleString('zh-CN', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function updateStats() {
            const normal = allTasks.filter(t => t.status === 'normal').length;
            const delayed = allTasks.filter(t => t.status === 'delayed').length;
            const failed = allTasks.filter(t => t.status === 'failed').length;
            
            document.getElementById('stat-normal').textContent = normal;
            document.getElementById('stat-delayed').textContent = delayed;
            document.getElementById('stat-failed').textContent = failed;
            document.getElementById('stat-total').textContent = allTasks.length;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 初始化
        loadTasks();
        
        // 每 30 秒自动刷新
        setInterval(loadTasks, 30000);
    </script>
</body>
</html>
