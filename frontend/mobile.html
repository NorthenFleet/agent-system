<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Agent OS">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  <title>OpenClaw Agent OS</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: rgba(22, 33, 49, 0.78);
      --panel-strong: rgba(31, 45, 65, 0.94);
      --line: rgba(148, 163, 184, 0.18);
      --text: #e6edf7;
      --muted: #91a3b8;
      --blue: #58a6ff;
      --green: #4ade80;
      --amber: #fbbf24;
      --red: #fb7185;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "Noto Sans SC", sans-serif;
      background: radial-gradient(circle at 30% -10%, rgba(88, 166, 255, 0.18), transparent 34%), var(--bg);
      color: var(--text);
    }
    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 86px);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 { margin: 0; font-size: 1.72rem; letter-spacing: 0; }
    .sub { margin-top: 6px; color: var(--muted); font-size: 0.9rem; }
    .pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(145deg, var(--panel-strong), var(--panel));
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(18px);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .panel-hd {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 15px 10px;
      border-bottom: 1px solid var(--line);
    }
    .panel-hd h2 { margin: 0; font-size: 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
    }
    .metric {
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.045);
      padding: 13px;
    }
    .metric span { color: var(--muted); font-size: 0.8rem; }
    .metric strong { display: block; margin-top: 10px; font-size: 1.65rem; }
    .list { padding: 10px; display: grid; gap: 9px; }
    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.045);
    }
    .row { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .title { font-weight: 750; line-height: 1.35; }
    .meta { color: var(--muted); font-size: 0.78rem; margin-top: 5px; line-height: 1.45; }
    .bar { margin-top: 10px; height: 7px; border-radius: 999px; background: rgba(255,255,255,0.12); overflow: hidden; }
    .fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--blue), #8bd3ff); }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      color: #d8e9ff;
      background: rgba(88,166,255,0.16);
      border: 1px solid rgba(88,166,255,0.28);
      font-size: 0.74rem;
      white-space: nowrap;
      text-decoration: none;
    }
    .tag.green { color: #dcfce7; background: rgba(74,222,128,0.14); border-color: rgba(74,222,128,0.28); }
    .tag.amber { color: #fef3c7; background: rgba(251,191,36,0.14); border-color: rgba(251,191,36,0.28); }
    .tag.red { color: #ffe4e6; background: rgba(251,113,133,0.14); border-color: rgba(251,113,133,0.28); }
    .actions { display: grid; gap: 9px; padding: 10px; }
    .button {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      color: white;
      border: 1px solid rgba(88,166,255,0.35);
      background: rgba(88,166,255,0.18);
      border-radius: 14px;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
      font: inherit;
    }
    .button:disabled { opacity: 0.45; cursor: not-allowed; }
    .button.secondary { background: rgba(255,255,255,0.06); border-color: var(--line); color: var(--text); }
    .notice {
      margin-bottom: 14px;
      border: 1px solid rgba(251,191,36,0.32);
      background: rgba(251,191,36,0.1);
      color: #fef3c7;
      border-radius: 14px;
      padding: 11px 13px;
      font-size: 0.84rem;
      display: none;
    }
    nav {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      transform: translateX(-50%);
      width: min(430px, calc(100vw - 24px));
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(11, 18, 32, 0.86);
      backdrop-filter: blur(18px);
      box-shadow: 0 14px 34px rgba(0,0,0,0.34);
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      text-align: center;
      font-size: 0.72rem;
      padding: 8px 2px;
      border-radius: 14px;
    }
    nav a.active { color: white; background: rgba(88,166,255,0.18); }
    .empty { padding: 18px; color: var(--muted); text-align: center; }
    @media (min-width: 720px) {
      .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .two { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    }
    @media (min-width: 960px) {
      .tablet-grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 14px; align-items: start; }
      #events { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Agent OS</h1>
        <div class="sub">OpenClaw 移动指挥终端</div>
      </div>
      <div class="pill" id="updated">同步中</div>
    </header>
    <div class="notice" id="offlineNotice">当前显示的是离线缓存状态，网络恢复后会自动刷新。</div>

    <section class="panel" id="overview">
      <div class="panel-hd"><h2>运行概览</h2><span class="tag" id="schema">control-plane</span></div>
      <div class="grid" id="metrics"></div>
    </section>

    <div class="tablet-grid">
      <div>
        <section class="panel" id="attention">
          <div class="panel-hd"><h2>需要处理</h2><span class="tag amber" id="attentionCount">0 项</span></div>
          <div class="list" id="attentionList"></div>
        </section>

        <section class="panel" id="projects">
          <div class="panel-hd"><h2>开放项目</h2><a class="tag" href="/?view=tasks">完整看板</a></div>
          <div class="list" id="projectList"></div>
        </section>
      </div>

      <div>
        <section class="panel" id="agents">
          <div class="panel-hd"><h2>智能体</h2><a class="tag" href="/?view=agents">团队页面</a></div>
          <div class="list" id="agentList"></div>
        </section>

        <section class="panel">
          <div class="panel-hd"><h2>快速操作</h2><span class="tag amber" id="installHint">可添加到主屏幕</span></div>
          <div class="actions" id="actions"></div>
        </section>
      </div>
    </div>

    <section class="panel" id="events">
      <div class="panel-hd"><h2>最近事件</h2><span class="tag">自动刷新</span></div>
      <div class="list" id="eventList"></div>
    </section>
  </main>

  <nav>
    <a href="#overview" class="active">概览</a>
    <a href="#attention">处理</a>
    <a href="#projects">项目</a>
    <a href="#agents">智能体</a>
  </nav>

  <script>
    const CACHE_KEY = 'agent-os-mobile-summary-v1';
    const $ = (id) => document.getElementById(id);
    const pct = (v) => Math.max(0, Math.min(100, Number(v || 0)));
    const fmtTime = (value) => value ? new Date(value).toLocaleString('zh-CN', { hour12: false }) : '-';
    const tagClass = (status) => {
      const s = String(status || '').toLowerCase();
      if (['done', 'completed', 'idle'].includes(s)) return 'green';
      if (['blocked', 'failed', 'error'].includes(s)) return 'red';
      if (['running', 'busy', 'in_progress', 'active'].includes(s)) return 'amber';
      return '';
    };
    const severityLabel = (value) => ({ blocked: '阻塞', review: '待确认', assign: '待分配' }[value] || value || '待处理');

    function setOfflineMode(enabled) {
      $('offlineNotice').style.display = enabled ? 'block' : 'none';
    }

    async function runAction(action) {
      if (action.disabled) return;
      if (action.href) {
        location.href = action.href;
        return;
      }
      if (!action.endpoint || action.method !== 'POST') return;
      const button = document.querySelector(`[data-action-id="${action.id}"]`);
      const original = button?.textContent;
      if (button) {
        button.disabled = true;
        button.textContent = '执行中...';
      }
      try {
        const res = await fetch(action.endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(action.body || { requested_by: 'mobile-command' }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        if (button) button.textContent = '已记录';
        setTimeout(refresh, 800);
      } catch (err) {
        if (button) button.textContent = `失败：${err.message}`;
      } finally {
        setTimeout(() => {
          if (button) {
            button.disabled = false;
            button.textContent = original;
          }
        }, 1800);
      }
    }

    function render(data) {
      localStorage.setItem(CACHE_KEY, JSON.stringify(data));
      setOfflineMode(false);
      $('updated').textContent = fmtTime(data.updated_at);
      $('schema').textContent = data.schema || 'control-plane';
      const s = data.summary || {};
      const metrics = [
        ['开放项目', s.projects?.open ?? 0, `总计 ${s.projects?.total ?? 0}`],
        ['开放任务', s.tasks?.open ?? 0, `阻塞 ${s.tasks?.blocked ?? 0}`],
        ['开发要点', s.development_points?.done ?? 0, `总计 ${s.development_points?.total ?? 0}`],
        ['执行实例', s.agents?.running ?? 0, `实例 ${s.agents?.instances ?? 0}`],
      ];
      $('metrics').innerHTML = metrics.map(([label, value, sub]) => `
        <div class="metric"><span>${label}</span><strong>${value}</strong><div class="meta">${sub}</div></div>
      `).join('');

      $('projectList').innerHTML = (data.projects || []).length ? data.projects.map((p) => `
        <article class="item">
          <div class="row"><div class="title">${p.name || '未命名项目'}</div><span class="tag ${tagClass(p.status)}">${p.status || 'unknown'}</span></div>
          <div class="meta">${p.owner_agent || '未配置负责人'} · ${p.task_open}/${p.task_total} 个开放任务</div>
          <div class="bar"><div class="fill" style="width:${pct(p.progress)}%"></div></div>
        </article>
      `).join('') : '<div class="empty">暂无开放项目</div>';

      $('attentionCount').textContent = `${(data.attention || []).length} 项`;
      $('attentionList').innerHTML = (data.attention || []).map((item) => `
        <article class="item">
          <div class="row"><div class="title">${item.title || '待处理事项'}</div><span class="tag ${tagClass(item.severity)}">${severityLabel(item.severity)}</span></div>
          <div class="meta">${item.project_name || ''}</div>
          <div class="meta">${item.description || ''}</div>
          <div style="margin-top:10px;"><a class="tag" href="${item.href || '/'}">查看详情</a></div>
        </article>
      `).join('') || '<div class="empty">暂无需要处理事项</div>';

      $('agentList').innerHTML = (data.agents || []).map((a) => `
        <article class="item">
          <div class="row"><div class="title">${a.emoji || ''} ${a.name || a.id}</div><span class="tag ${tagClass(a.status)}">${a.status}</span></div>
          <div class="meta">${a.title || '未配置职责'}</div>
        </article>
      `).join('') || '<div class="empty">暂无智能体</div>';

      $('eventList').innerHTML = (data.events || []).map((e) => `
        <article class="item">
          <div class="row"><div class="title">${e.action || 'event'}</div><span class="tag">${e.agent || 'system'}</span></div>
          <div class="meta">${e.project || ''} · ${fmtTime(e.time)}</div>
          <div class="meta">${e.content || ''}</div>
        </article>
      `).join('') || '<div class="empty">暂无事件</div>';

      $('actions').innerHTML = (data.actions || []).map((a) => {
        if (a.method === 'POST') {
          return `<button class="button" data-action-id="${a.id}" ${a.disabled ? 'disabled' : ''}>${a.label}</button>`;
        }
        return `<a class="button secondary" href="${a.href}">${a.label}</a>`;
      }).join('');
      (data.actions || []).forEach((action) => {
        const button = document.querySelector(`[data-action-id="${action.id}"]`);
        if (button) button.addEventListener('click', () => runAction(action));
      });
    }

    async function refresh() {
      try {
        const res = await fetch('/api/agent-os/mobile-summary', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        render(await res.json());
      } catch (err) {
        $('updated').textContent = '离线/连接失败';
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          render(JSON.parse(cached));
          $('updated').textContent = '离线缓存';
          setOfflineMode(true);
        } else {
          $('metrics').innerHTML = `<div class="empty" style="grid-column: 1 / -1;">${err.message}</div>`;
        }
      }
    }

    document.querySelectorAll('nav a').forEach((link) => {
      link.addEventListener('click', () => {
        document.querySelectorAll('nav a').forEach((item) => item.classList.remove('active'));
        link.classList.add('active');
      });
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    refresh();
    setInterval(refresh, 15000);
  </script>
</body>
</html>
