<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务计划管理 - 团队看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #58a6ff; margin-bottom: 20px; }
        
        .section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 {
            color: #58a6ff;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .plan-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .plan-card.approved { border-color: #3fb950; }
        .plan-card.pending { border-color: #d29922; }
        .plan-card.rejected { border-color: #f85149; }
        
        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .plan-title { font-size: 16px; font-weight: 600; }
        .plan-status {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-pending_review { background: rgba(210, 153, 34, 0.2); color: #d29922; }
        .status-approved { background: rgba(63, 185, 80, 0.2); color: #3fb950; }
        .status-rejected { background: rgba(248, 81, 73, 0.2); color: #f85149; }
        
        .plan-meta {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 10px;
        }
        
        .steps { margin-top: 15px; }
        .step {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: #161b22;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .step.completed { opacity: 0.6; }
        .step-index {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .step.completed .step-index { background: #3fb950; color: #0d1117; }
        .step-name { flex: 1; }
        .step-executor { color: #8b949e; font-size: 12px; }
        
        .btn {
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-approve {
            background: #238636;
            border-color: #238636;
            color: white;
        }
        .btn-approve:hover { background: #2ea043; }
        .btn-reject {
            background: #da3633;
            border-color: #da3633;
            color: white;
        }
        .btn-reject:hover { background: #f85149; }
        .btn-execute {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }
        .btn-execute:hover { background: #388bfd; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #30363d;
        }
        
        .loading { text-align: center; padding: 40px; color: #8b949e; }
        .empty { text-align: center; padding: 40px; color: #8b949e; }
        
        .btn-generate {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
            padding: 8px 20px;
        }
        .btn-generate:hover { background: #388bfd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 任务计划管理</h1>
        
        <div class="section">
            <h2>
                <span>待审核计划</span>
                <button class="btn btn-generate" onclick="generateAllPlans()">🔄 李奥纳多生成计划</button>
            </h2>
            <div id="pending-plans" class="loading">加载中...</div>
        </div>
        
        <div class="section">
            <h2>已通过计划</h2>
            <div id="approved-plans" class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        
        async function loadPlans() {
            try {
                const [pendingRes, allRes] = await Promise.all([
                    fetch(`${API_BASE}/api/plans/pending`),
                    fetch(`${API_BASE}/api/plans`)
                ]);
                
                const pending = await pendingRes.json();
                const all = await allRes.json();
                
                renderPendingPlans(pending.plans || []);
                renderApprovedPlans(all.plans || []);
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('pending-plans').innerHTML = '<div class="empty">加载失败</div>';
                document.getElementById('approved-plans').innerHTML = '<div class="empty">加载失败</div>';
            }
        }
        
        function renderPendingPlans(plans) {
            const container = document.getElementById('pending-plans');
            
            if (plans.length === 0) {
                container.innerHTML = '<div class="empty">暂无待审核计划</div>';
                return;
            }
            
            container.innerHTML = plans.map(plan => `
                <div class="plan-card pending">
                    <div class="plan-header">
                        <div class="plan-title">📝 任务 ${plan.task_id} - ${getTaskTitle(plan.task_id)}</div>
                        <span class="plan-status status-pending_review">待审核</span>
                    </div>
                    <div class="plan-meta">
                        创建者：${plan.creator} | 
                        类型：${getTypeName(plan.type)} | 
                        预计：${plan.estimated_hours}小时
                    </div>
                    <div class="steps">
                        ${(plan.steps || []).map(step => `
                            <div class="step">
                                <div class="step-index">${step.index + 1}</div>
                                <div class="step-name">${step.name}</div>
                                <div class="step-executor">${step.executor}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="actions">
                        <button class="btn btn-approve" onclick="reviewPlan('${plan.id}', true)">✅ 通过</button>
                        <button class="btn btn-reject" onclick="reviewPlan('${plan.id}', false)">❌ 拒绝</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderApprovedPlans(plans) {
            const container = document.getElementById('approved-plans');
            const approved = plans.filter(p => p.status === 'approved');
            
            if (approved.length === 0) {
                container.innerHTML = '<div class="empty">暂无已通过计划</div>';
                return;
            }
            
            container.innerHTML = approved.map(plan => `
                <div class="plan-card approved">
                    <div class="plan-header">
                        <div class="plan-title">✅ 任务 ${plan.task_id} - ${getTaskTitle(plan.task_id)}</div>
                        <span class="plan-status status-approved">已通过</span>
                    </div>
                    <div class="plan-meta">
                        审核者：${plan.reviewer} | 
                        类型：${getTypeName(plan.type)} | 
                        预计：${plan.estimated_hours}小时
                    </div>
                    <div class="steps">
                        ${(plan.steps || []).map((step, i) => `
                            <div class="step ${step.status === 'completed' ? 'completed' : ''}">
                                <div class="step-index">${step.status === 'completed' ? '✓' : step.index + 1}</div>
                                <div class="step-name">${step.name}</div>
                                <div class="step-executor">${step.executor}</div>
                                ${step.status !== 'completed' ? `
                                    <button class="btn btn-execute" onclick="executeStep('${plan.id}', ${step.index})">▶ 执行</button>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                    <div class="actions">
                        <button class="btn btn-execute" onclick="executeAllSteps('${plan.id}')">🚀 执行全部</button>
                    </div>
                </div>
            `).join('');
        }
        
        function getTaskTitle(taskId) {
            const titles = {
                '001': '团队看板架构设计',
                '002': '团队看板前端设计',
                '003': '团队看板后端开发',
                '004': 'MD↔Office Skills'
            };
            return titles[taskId] || '未知任务';
        }
        
        function getTypeName(type) {
            const names = {
                'frontend': '前端开发',
                'backend': '后端开发',
                'testing': '测试',
                'general': '通用'
            };
            return names[type] || type;
        }
        
        async function generateAllPlans() {
            try {
                const res = await fetch(`${API_BASE}/api/plans/generate-all`, { method: 'POST' });
                const result = await res.json();
                alert(`已生成 ${result.generated.length} 个计划，跳过 ${result.skipped.length} 个`);
                loadPlans();
            } catch (error) {
                alert('生成失败：' + error);
            }
        }
        
        async function reviewPlan(planId, approved) {
            const comment = approved ? '计划合理，同意执行' : '需要修改';
            try {
                const res = await fetch(`${API_BASE}/api/plans/${planId}/review?approved=${approved}&comment=${encodeURIComponent(comment)}`, {
                    method: 'POST'
                });
                const result = await res.json();
                alert(result.success ? '审核成功' : '审核失败');
                loadPlans();
            } catch (error) {
                alert('审核失败：' + error);
            }
        }
        
        async function executeStep(planId, stepIndex) {
            try {
                const res = await fetch(`${API_BASE}/api/plans/${planId}/execute/${stepIndex}`, { method: 'POST' });
                const result = await res.json();
                alert(result.success ? '步骤执行成功' : '执行失败：' + result.error);
                loadPlans();
            } catch (error) {
                alert('执行失败：' + error);
            }
        }
        
        async function executeAllSteps(planId) {
            if (!confirm('确定要执行所有步骤吗？')) return;
            try {
                const res = await fetch(`${API_BASE}/api/plans/${planId}/execute-all`, { method: 'POST' });
                const result = await res.json();
                alert(result.success ? '所有步骤执行完成' : '执行失败');
                loadPlans();
            } catch (error) {
                alert('执行失败：' + error);
            }
        }
        
        // 初始化
        loadPlans();
    </script>
</body>
</html>
