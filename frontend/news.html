<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球新闻资讯 - 团队看板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            overflow: hidden;
            height: 100vh;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        /* 左侧地球 */
        .earth-section {
            width: 50%;
            position: relative;
            background: radial-gradient(ellipse at center, #1b2735 0%, #090a0f 100%);
        }
        #earth-container {
            width: 100%;
            height: 100vh;
        }
        .earth-title {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #58a6ff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        /* 右侧新闻 */
        .news-section {
            width: 50%;
            display: flex;
            flex-direction: column;
            background: #0d1117;
            border-left: 1px solid #30363d;
        }
        .news-header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .news-header h2 {
            color: #58a6ff;
            font-size: 20px;
        }
        .news-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .news-filters {
            display: flex;
            gap: 10px;
        }
        .refresh-btn {
            padding: 6px 12px;
            background: #238636;
            border: 1px solid rgba(240,246,252,0.1);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .refresh-btn:hover {
            background: #2ea043;
        }
        .refresh-btn:disabled {
            background: #21262d;
            color: #8b949e;
            cursor: not-allowed;
        }
        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
        .last-update {
            font-size: 12px;
            color: #8b949e;
            margin-left: 10px;
        }
        .filter-btn {
            padding: 6px 12px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #388bfd;
            border-color: #388bfd;
            color: white;
        }
        .news-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .news-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .news-item:hover {
            border-color: #58a6ff;
            transform: translateX(5px);
        }
        .news-item.active {
            border-color: #388bfd;
            background: #1c2128;
        }
        .news-item.highlight {
            border-color: #f78166;
            box-shadow: 0 0 10px rgba(247, 129, 102, 0.3);
        }
        .news-title {
            font-size: 15px;
            font-weight: 600;
            color: #c9d1d9;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .news-summary {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #8b949e;
        }
        .news-location {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .location-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #388bfd;
        }
        .news-priority {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .priority-high {
            background: rgba(247, 129, 102, 0.2);
            color: #f78166;
        }
        .priority-medium {
            background: rgba(139, 148, 158, 0.2);
            color: #8b949e;
        }
        .news-time {
            color: #8b949e;
        }
        /* 新闻详情 */
        .news-detail {
            display: none;
            padding: 20px;
            border-bottom: 1px solid #30363d;
            background: #161b22;
        }
        .news-detail.show {
            display: block;
        }
        .detail-title {
            font-size: 18px;
            font-weight: bold;
            color: #c9d1d9;
            margin-bottom: 10px;
        }
        .detail-content {
            font-size: 14px;
            color: #8b949e;
            line-height: 1.6;
        }
        .close-detail {
            float: right;
            cursor: pointer;
            color: #8b949e;
            font-size: 20px;
        }
        .close-detail:hover {
            color: #c9d1d9;
        }
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #58a6ff;
        }
        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: #8b949e;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧地球 -->
        <div class="earth-section">
            <div class="earth-title">🌍 全球新闻热点</div>
            <div id="earth-container"></div>
        </div>
        
        <!-- 右侧新闻 -->
        <div class="news-section">
            <div class="news-header">
                <h2>📰 新闻资讯</h2>
                <div class="news-controls">
                    <div class="news-filters" id="filters">
                        <button class="filter-btn active" data-category="all">全部</button>
                        <button class="filter-btn" data-category="科技">科技</button>
                        <button class="filter-btn" data-category="财经">财经</button>
                        <button class="filter-btn" data-category="能源">能源</button>
                    </div>
                    <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">
                        <span>🔄</span> 刷新
                    </button>
                    <span class="last-update" id="last-update">更新中...</span>
                </div>
            </div>
            
            <div class="news-detail" id="news-detail">
                <span class="close-detail" onclick="closeDetail()">&times;</span>
                <div class="detail-title" id="detail-title"></div>
                <div class="detail-content" id="detail-content"></div>
            </div>
            
            <div class="news-list" id="news-list">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let scene, camera, renderer, earth, markers = [];
        let allNews = [];
        let locations = {};
        let currentCategory = 'all';
        let refreshInterval = null;
        let isRefreshing = false;
        const REFRESH_INTERVAL_MS = 30 * 60 * 1000; // 30 分钟

        // 初始化 Three.js 场景
        function initEarth() {
            const container = document.getElementById('earth-container');
            
            // 场景
            scene = new THREE.Scene();
            
            // 相机
            camera = new THREE.PerspectiveCamera(
                45,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.z = 3;
            
            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            // 地球几何体
            const geometry = new THREE.SphereGeometry(1, 64, 64);
            
            // 加载纹理
            const textureLoader = new THREE.TextureLoader();
            const map = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
            const bumpMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
            const specularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
            
            // 材质
            const material = new THREE.MeshPhongMaterial({
                map: map,
                bumpMap: bumpMap,
                bumpScale: 0.05,
                specularMap: specularMap,
                specular: new THREE.Color(0x333333),
                shininess: 5
            });
            
            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);
            
            // 灯光
            const ambientLight = new THREE.AmbientLight(0x404040, 1);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(2, 1, 3).normalize();
            scene.add(directionalLight);
            
            // 鼠标交互
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            
            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });
            
            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    earth.rotation.y += deltaX * 0.005;
                    earth.rotation.x += deltaY * 0.005;
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });
            
            renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
            renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });
            
            // 窗口大小调整
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
            
            // 动画
            function animate() {
                requestAnimationFrame(animate);
                if (!isDragging) {
                    earth.rotation.y += 0.0005;
                }
                renderer.render(scene, camera);
            }
            animate();
        }

        // 经纬度转 3D 坐标
        function latLngToVector3(lat, lng, radius = 1.02) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            
            const x = -radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            
            return new THREE.Vector3(x, y, z);
        }

        // 添加标记点
        function addMarker(lat, lng, newsId, locationName) {
            const position = latLngToVector3(lat, lng);
            
            // 标记点
            const geometry = new THREE.SphereGeometry(0.03, 16, 16);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x388bfd,
                transparent: true,
                opacity: 0.8
            });
            const marker = new THREE.Mesh(geometry, material);
            marker.position.copy(position);
            marker.userData = { newsId, locationName };
            earth.add(marker);
            markers.push(marker);
            
            // 脉冲环
            const ringGeometry = new THREE.RingGeometry(0.04, 0.06, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x388bfd,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.position.copy(position);
            ring.lookAt(new THREE.Vector3(0, 0, 0));
            earth.add(ring);
            
            // 动画
            let scale = 1;
            function animateRing() {
                scale += 0.02;
                ring.scale.set(scale, scale, scale);
                ringMaterial.opacity = 0.5 / scale;
                if (scale < 3) {
                    requestAnimationFrame(animateRing);
                } else {
                    earth.remove(ring);
                }
            }
            animateRing();
            
            return marker;
        }

        // 加载新闻
        async function loadNews() {
            try {
                const [newsRes, locRes] = await Promise.all([
                    fetch('/api/news'),
                    fetch('/api/news/locations')
                ]);
                
                const newsData = await newsRes.json();
                const locData = await locRes.json();
                
                allNews = newsData.news || [];
                locations = locData.locations || {};
                
                renderNews(allNews);
                addMarkers();
            } catch (error) {
                console.error('加载新闻失败:', error);
                document.getElementById('news-list').innerHTML = 
                    '<div class="loading">加载失败，请刷新页面</div>';
            }
        }

        // 渲染新闻列表
        function renderNews(news) {
            const container = document.getElementById('news-list');
            
            if (news.length === 0) {
                container.innerHTML = '<div class="loading">暂无新闻</div>';
                return;
            }
            
            container.innerHTML = news.map(item => {
                const loc = locations[item.location] || {};
                const time = new Date(item.published_at).toLocaleString('zh-CN', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                return `
                    <div class="news-item" data-id="${item.id}" data-location="${item.location}" onclick="selectNews('${item.id}')">
                        <div class="news-title">${item.title}</div>
                        <div class="news-summary">${item.summary}</div>
                        <div class="news-meta">
                            <div class="news-location">
                                <span class="location-dot"></span>
                                <span>${loc.name || item.location}</span>
                            </div>
                            <div>
                                <span class="news-priority priority-${item.priority}">${item.priority === 'high' ? '重要' : '普通'}</span>
                                <span class="news-time" style="margin-left: 10px">${time}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 添加所有标记点
        function addMarkers() {
            // 清除旧标记
            markers.forEach(m => earth.remove(m));
            markers = [];
            
            // 为每个有新闻的位置添加标记
            const locationNews = {};
            allNews.forEach(news => {
                if (news.location && locations[news.location]) {
                    if (!locationNews[news.location]) {
                        locationNews[news.location] = news;
                    }
                }
            });
            
            Object.keys(locationNews).forEach(locKey => {
                const loc = locations[locKey];
                const news = locationNews[locKey];
                addMarker(loc.lat, loc.lng, news.id, loc.name);
            });
        }

        // 选择新闻
        function selectNews(newsId) {
            const news = allNews.find(n => n.id === newsId);
            if (!news) return;
            
            // 高亮新闻项
            document.querySelectorAll('.news-item').forEach(item => {
                item.classList.remove('active', 'highlight');
                if (item.dataset.id === newsId) {
                    item.classList.add('active', 'highlight');
                }
            });
            
            // 旋转地球到对应位置
            const loc = locations[news.location];
            if (loc) {
                const targetRotationY = -loc.lng * (Math.PI / 180) - Math.PI / 2;
                const targetRotationX = (90 - loc.lat) * (Math.PI / 180);
                
                earth.rotation.y = targetRotationY;
                earth.rotation.x = targetRotationX * 0.3;
            }
            
            // 显示详情
            document.getElementById('detail-title').textContent = news.title;
            document.getElementById('detail-content').textContent = news.summary;
            document.getElementById('news-detail').classList.add('show');
        }

        // 关闭详情
        function closeDetail() {
            document.getElementById('news-detail').classList.remove('show');
            document.querySelectorAll('.news-item').forEach(item => {
                item.classList.remove('active', 'highlight');
            });
        }

        // 筛选新闻
        function filterNews(category) {
            currentCategory = category;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
            
            if (category === 'all') {
                renderNews(allNews);
                addMarkers();
            } else {
                const filtered = allNews.filter(n => n.category === category);
                renderNews(filtered);
                
                // 只显示筛选后的标记
                markers.forEach(m => earth.remove(m));
                markers = [];
                
                const locationNews = {};
                filtered.forEach(news => {
                    if (news.location && locations[news.location]) {
                        locationNews[news.location] = news;
                    }
                });
                
                Object.keys(locationNews).forEach(locKey => {
                    const loc = locations[locKey];
                    addMarker(loc.lat, loc.lng, locationNews[locKey].id, loc.name);
                });
            }
        }

        // 事件监听
        document.getElementById('filters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                filterNews(e.target.dataset.category);
            }
        });

        // 手动刷新
        async function manualRefresh() {
            if (isRefreshing) return;
            
            isRefreshing = true;
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.classList.add('spinning');
            
            try {
                const response = await fetch('/api/news/refresh', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    await loadNews();
                    updateLastUpdateTime();
                } else {
                    alert('刷新失败，请稍后重试');
                }
            } catch (error) {
                console.error('刷新失败:', error);
                alert('刷新失败：' + error.message);
            } finally {
                isRefreshing = false;
                btn.disabled = false;
                btn.classList.remove('spinning');
            }
        }

        // 自动刷新
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(async () => {
                console.log('[Auto] 自动刷新新闻...');
                try {
                    await loadNews();
                    updateLastUpdateTime();
                } catch (error) {
                    console.error('[Auto] 刷新失败:', error);
                }
            }, REFRESH_INTERVAL_MS);
            console.log(`[Auto] 自动刷新已启动，间隔：${REFRESH_INTERVAL_MS/1000/60}分钟`);
        }

        // 更新最后更新时间
        function updateLastUpdateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('last-update').textContent = `最后更新：${timeStr}`;
        }

        // 加载新闻统计
        async function loadNewsStats() {
            try {
                const response = await fetch('/api/news/stats');
                const data = await response.json();
                console.log('[Stats] 新闻统计:', data.stats);
            } catch (error) {
                console.error('[Stats] 加载统计失败:', error);
            }
        }

        // 初始化
        initEarth();
        loadNews().then(() => {
            updateLastUpdateTime();
            startAutoRefresh();
            loadNewsStats();
        });
    </script>
</body>
</html>
